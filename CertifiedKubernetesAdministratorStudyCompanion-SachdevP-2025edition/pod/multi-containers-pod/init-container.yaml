apiVersion: v1
kind: Pod
metadata:
  name: myapp-pod
  labels:
    app.kubernetes.io/app: MyApp
spec:
  containers:
    - name: nginx-c1
      image: nginx:latest
      ports:
        - containerPort: 80
  initContainers:
    - name: init-service
      image: busybox:1.28
      command: ["sh", "-c", "echo The app is running! && sleep 60"]
