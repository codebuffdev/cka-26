apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: BE # namespace
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: hashicorp/http-echo
          args:
            - "-text=Hello from Backend"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: BE # spec namespace
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 5678
