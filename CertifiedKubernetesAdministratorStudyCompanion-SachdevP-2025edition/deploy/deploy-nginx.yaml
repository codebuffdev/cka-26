apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-nginx
  labels:
    app.kubernetes.io/name: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-pod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-pod
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
